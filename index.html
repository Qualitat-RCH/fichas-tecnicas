<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Fichas Técnicas</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .contenedor {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>

</head>
<body>

    <div class="contenedor">

        <h1>Portal de Fichas Técnicas</h1>
<p>Acceso para clientes</p>

        <p>Introduce tu código de cliente</p>

<input type="text" id="codigoCliente" placeholder="Código cliente">

<br>

<button onclick="validarAcceso()">Validar acceso</button>

<p id="mensaje"></p>

<div id="zonaArticulo" style="display: none;">
    <hr>

    <p>Introduce el código de artículo</p>

    <input type="text" id="codigoArticulo" placeholder="Código artículo">

    <br>

    <button onclick="buscarFicha()">Buscar ficha técnica</button>

    <p id="mensajeArticulo"></p>
</div>

    </div>
<script>
async function validarAcceso() {

    const codigoCliente = document.getElementById("codigoCliente").value;

    if (codigoCliente.trim() === "") {
        document.getElementById("mensaje").innerText =
            "Introduce tu código de cliente.";
        return;
    }

    document.getElementById("mensaje").innerText =
        "Validando cliente...";

    try {

        const respuesta = await fetch(
"https://restless-sea-90cc.adolfo-iglesias.workers.dev/?accion=validarCliente&codigoCliente=" +
encodeURIComponent(codigoCliente)
        );

        const datos = await respuesta.json();

        if (datos.ok) {

            document.getElementById("mensaje").innerText =
                "Bienvenido " + datos.nombreCliente;

            document.getElementById("zonaArticulo").style.display = "block";

        } else {

            document.getElementById("mensaje").innerText =
                datos.mensaje;

            document.getElementById("zonaArticulo").style.display = "none";
        }

    } catch (error) {

        document.getElementById("mensaje").innerText =
            "Error de conexión";

        document.getElementById("zonaArticulo").style.display = "none";
    }
}

async function buscarFicha() {

    const codigoArticulo = document.getElementById("codigoArticulo").value;

    if (codigoArticulo.trim() === "") {
        document.getElementById("mensajeArticulo").innerText =
            "Introduce el código de artículo.";
        return;
    }

    const codigoNormalizado = codigoArticulo.trim().padStart(5, "0");

    if (codigoNormalizado.length > 5) {
        document.getElementById("mensajeArticulo").innerText =
            "El código de artículo debe tener máximo 5 dígitos.";
        return;
    }

    document.getElementById("mensajeArticulo").innerText =
        "Buscando ficha técnica del artículo " + codigoNormalizado + "...";

    try {

        const respuesta = await fetch(
"https://restless-sea-90cc.adolfo-iglesias.workers.dev/?accion=buscarFicha&codigoMaterial=" +
encodeURIComponent(codigoNormalizado)
        );

        const datos = await respuesta.json();

        if (datos.ok) {

            document.getElementById("mensajeArticulo").innerHTML =
                "✓ Ficha técnica encontrada<br><br>" +
                "Material: " + datos.codigoMaterial + "<br>" +
                "Proveedor: " + datos.codigoProveedor + "<br>" +
                "Idioma: " + datos.idioma + "<br>" +
                "Fecha: " + new Date(datos.fechaFicha).toLocaleDateString("es-ES") + "<br><br>" +
                "<a href='" + datos.urlPDF + "' target='_blank'>" +
                "<button>Ver ficha técnica PDF</button>" +
                "</a>";

        } else {

            document.getElementById("mensajeArticulo").innerText =
                datos.mensaje;
        }

    } catch (error) {

        document.getElementById("mensajeArticulo").innerText =
            "Error de conexión al buscar la ficha técnica.";
    }
}
</script>
</body>
</html>
