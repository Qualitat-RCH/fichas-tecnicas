<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Fichas Técnicas</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .contenedor {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>

</head>
<body>

    <div class="contenedor">

        <h1>Portal de Fichas Técnicas</h1>
<p>Acceso para clientes</p>

        <p>Introduce tu código de cliente</p>

<input type="text" id="codigoCliente" placeholder="Código cliente">

<br>

<button onclick="validarAcceso()">Validar acceso</button>

<p id="mensaje"></p>

<div id="zonaArticulo" style="display: none;">
    <hr>

    <p>Introduce el código de artículo</p>

    <input type="text" id="codigoArticulo" placeholder="Código artículo">

    <br>

    <button onclick="buscarFicha()">Buscar ficha técnica</button>

    <p id="mensajeArticulo"></p>
</div>

    </div>
<script>
    function validarAcceso() {
        const codigoCliente = document.getElementById("codigoCliente").value;

        if (codigoCliente.trim() === "") {
            document.getElementById("mensaje").innerText = "Introduce tu código de cliente.";
        } else {
            document.getElementById("mensaje").innerText = "Acceso validado correctamente.";
            document.getElementById("zonaArticulo").style.display = "block";
        }
    }

    function buscarFicha() {
        const codigoArticulo = document.getElementById("codigoArticulo").value;

        if (codigoArticulo.trim() === "") {
            document.getElementById("mensajeArticulo").innerText = "Introduce el código de artículo.";
        } else {
            document.getElementById("mensajeArticulo").innerText = "Buscando ficha técnica del artículo " + codigoArticulo + "...";
        }
    }
</script>
</body>
</html>
